backend = "glx";
glx-copy-from-front = false;

blur-background = true;
blur-method = "dual_kawase"
blur-strength = 3;


opacity-rule = [
  "80:class_g = 'st-256color'"
];

#shadow
shadow = true;
shadow-radius = 12;
shadow-offset-x = -4;
shadow-offset-y = -4;
shadow-opacity = 0.8;

vsync = true

glx-copy-from-front = false;
use-damage = false; 
xrender-sync-fence = true;
